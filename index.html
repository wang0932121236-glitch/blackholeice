const supabaseFetch = async (endpoint, options = {}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...options.headers,
    },
  });
  return res.json();
};

const supabaseStorage = async (file, folder = 'products') => {
  const fileName = `${folder}/${Date.now()}-${file.name}`;
  const formData = new FormData();
  formData.append('file', file);

  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/product-images/${fileName}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
    },
    body: formData,
  });
  if (!res.ok) throw new Error('Upload failed');
  return `${SUPABASE_URL}/storage/v1/object/public/product-images/${fileName}`;
};

// ============ FADING VIDEO ============
class FadingVideo extends React.Component {
  state = { loaded: false };

  componentDidMount() {
    const video = this.videoRef.current;
    if (!video) return;
    const handleCanPlay = () => this.setState({ loaded: true });
    video.addEventListener("canplay", handleCanPlay);
    this._cleanup = () => video.removeEventListener("canplay", handleCanPlay);
  }

  componentWillUnmount() {
    if (this._cleanup) this._cleanup();
  }

  render() {
    const { src, className, style } = this.props;
    return (
      <video
        ref={el => this.videoRef = el}
        className={`${className} transition-opacity duration-1000 ${this.state.loaded ? 'opacity-100' : 'opacity-0'}`}
        style={style}
        src={src}
        autoPlay
        muted
        playsInline
        preload="auto"
      />
    );
  }
}

// ============ BLUR TEXT ============
class BlurText extends React.Component {
  state = { visible: false };

  componentDidMount() {
    this.observer = new IntersectionObserver(
      ([e]) => e.isIntersecting && this.setState({ visible: true }),
      { threshold: 0.1 }
    );
    this.observer.observe(this._span);
  }

  componentWillUnmount() {
    this.observer.disconnect();
  }

  render() {
    const { text, className = "" } = this.props;
    const { visible } = this.state;
    const words = text.split(" ");

    return (
      <span ref={el => this._span = el} className={`flex flex-wrap justify-center ${className}`} style={{ rowGap: "0.1em" }}>
        {words.map((word, i) => (
          <span
            key={i}
            className="mr-[0.28em] inline-block"
            style={{
              filter: visible ? "blur(0px)" : "blur(10px)",
              opacity: visible ? 1 : 0,
              transform: visible ? "translateY(0)" : "translateY(20px)",
              transition: `all 0.7s ease-out ${i * 0.1}s`,
              display: "inline-block",
            }}
          >
            {word}
          </span>
        ))}
      </span>
    );
  }
}

// ============ ADMIN PANEL ============
function AdminPanel({ onClose }) {
  const [isLoggedIn, setIsLoggedIn] = React.useState(false);
  const [password, setPassword] = React.useState('');
  const [products, setProducts] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [showForm, setShowForm] = React.useState(false);
  const [editingProduct, setEditingProduct] = React.useState(null);
  const [formData, setFormData] = React.useState({ name: '', price: '', description: '', category: 'Lab Diamond', images: [] });

  const categories = ['Lab Diamond', 'Handmade', 'Silver & Plated', 'Standard', 'Custom'];

  const handleLogin = () => {
    if (password === ADMIN_PASSWORD) {
      setIsLoggedIn(true);
      loadProducts();
    } else {
      alert('Incorrect password');
    }
  };

  const loadProducts = async () => {
    setLoading(true);
    const data = await supabaseFetch('products?order=created_at.desc');
    setProducts(data);
    setLoading(false);
  };

  const handleImageUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (files.length > 5) {
      alert('Maximum 5 images allowed');
      return;
    }
    const uploadedUrls = [];
    for (const file of files) {
      try {
        const url = await supabaseStorage(file);
        uploadedUrls.push(url);
      } catch (err) {
        console.error('Upload error:', err);
      }
    }
    setFormData(prev => ({ ...prev, images: [...prev.images, ...uploadedUrls] }));
  };

  const removeImage = (index) => {
    setFormData(prev => ({ ...prev, images: prev.images.filter((_, i) => i !== index) }));
  };

  const handleSubmit = async () => {
    if (!formData.name || !formData.price) {
      alert('Please fill in name and price');
      return;
    }
    setLoading(true);
    try {
      if (editingProduct) {
        await supabaseFetch(`products?id=eq.${editingProduct.id}`, {
          method: 'PATCH',
          headers: { 'Prefer': 'return=representation' },
          body: JSON.stringify(formData),
        });
      } else {
        await supabaseFetch('products', {
          method: 'POST',
          headers: { 'Prefer': 'return=representation' },
          body: JSON.stringify(formData),
        });
      }
      setShowForm(false);
      setEditingProduct(null);
      setFormData({ name: '', price: '', description: '', category: 'Lab Diamond', images: [] });
      loadProducts();
    } catch (err) {
      alert('Error saving product');
    }
    setLoading(false);
  };

  const handleDelete = async (id) => {
    if (!confirm('Delete this product?')) return;
    setLoading(true);
    await supabaseFetch(`products?id=eq.${id}`, { method: 'DELETE' });
    loadProducts();
    setLoading(false);
  };

  const handleEdit = (product) => {
    setEditingProduct(product);
    setFormData({ name: product.name, price: product.price, description: product.description || '', category: product.category, images: product.images || [] });
    setShowForm(true);
  };

  if (!isLoggedIn) {
    return (
      <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div className="bg-zinc-900 rounded-2xl p-8 max-w-md w-full">
          <h2 className="text-white text-2xl font-heading italic mb-6">Admin Login</h2>
          <input
            type="password"
            value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleLogin()}
            placeholder="Enter admin password"
            className="w-full bg-white/5 border border-white/10 px-4 py-3 rounded-lg text-white placeholder:text-white/40 focus:outline-none focus:border-amber-500 mb-4"
          />
          <button onClick={handleLogin} className="w-full liquid-glass-strong rounded-full px-6 py-3 text-white font-medium">Login</button>
          <button onClick={onClose} className="w-full mt-4 text-white/60 text-sm">Close</button>
        </div>
      </div>
    );
  }

  return (
    <div className="fixed inset-0 bg-black/95 z-50 overflow-y-auto">
      <div className="max-w-6xl mx-auto p-4 md:p-8">
        <div className="flex items-center justify-between mb-8">
          <h2 className="text-white text-2xl font-heading italic">Product Management</h2>
          <div className="flex gap-4">
            <button onClick={() => { setShowForm(true); setEditingProduct(null); setFormData({ name: '', price: '', description: '', category: 'Lab Diamond', images: [] }); }} className="liquid-glass-strong rounded-full px-6 py-3 text-white text-sm font-medium">Add Product</button>
            <button onClick={onClose} className="bg-white/10 rounded-full px-6 py-3 text-white/60 text-sm">Close</button>
          </div>
        </div>

        {showForm && (
          <div className="bg-zinc-900 rounded-2xl p-6 mb-8">
            <h3 className="text-white text-xl font-medium mb-6">{editingProduct ? 'Edit Product' : 'Add New Product'}</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <input type="text" value={formData.name} onChange={e => setFormData(prev => ({ ...prev, name: e.target.value }))} placeholder="Product Name" className="bg-white/5 border border-white/10 px-4 py-3 rounded-lg text-white placeholder:text-white/40 focus:outline-none focus:border-amber-500" />
              <input type="number" value={formData.price} onChange={e => setFormData(prev => ({ ...prev, price: e.target.value }))} placeholder="Price ($)" className="bg-white/5 border border-white/10 px-4 py-3 rounded-lg text-white placeholder:text-white/40 focus:outline-none focus:border-amber-500" />
            </div>
            <select value={formData.category} onChange={e => setFormData(prev => ({ ...prev, category: e.target.value }))} className="w-full bg-white/5 border border-white/10 px-4 py-3 rounded-lg text-white focus:outline-none focus:border-amber-500 mb-4">
              {categories.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <textarea value={formData.description} onChange={e => setFormData(prev => ({ ...prev, description: e.target.value }))} placeholder="Product Description" rows="3" className="w-full bg-white/5 border border-white/10 px-4 py-3 rounded-lg text-white placeholder:text-white/40 focus:outline-none focus:border-amber-500 mb-4" />
            <div className="mb-4">
              <label className="block text-white/60 text-sm mb-2">Product Images (max 5)</label>
              <input type="file" multiple onChange={handleImageUpload} accept="image/*" className="text-white text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-amber-500 file:text-black file:font-medium hover:file:bg-amber-400" />
              {formData.images.length > 0 && (
                <div className="flex flex-wrap gap-2 mt-4">
                  {formData.images.map((url, i) => (
                    <div key={i} className="relative w-20 h-20 rounded-lg overflow-hidden">
                      <img src={url} alt="" className="w-full h-full object-cover" />
                      <button onClick={() => removeImage(i)} className="absolute top-0 right-0 bg-red-500 text-white text-xs w-5 h-5">×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="flex gap-4">
              <button onClick={handleSubmit} disabled={loading} className="liquid-glass-strong rounded-full px-8 py-3 text-white text-sm font-medium">{loading ? 'Saving...' : 'Save Product'}</button>
              <button onClick={() => { setShowForm(false); setEditingProduct(null); }} className="bg-white/10 rounded-full px-8 py-3 text-white/60 text-sm">Cancel</button>
            </div>
          </div>
        )}

        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          {products.map(product => (
            <div key={product.id} className="bg-zinc-900 rounded-xl p-4">
              <div className="aspect-square rounded-lg overflow-hidden bg-zinc-800 mb-3">
                {product.images && product.images[0] ? (
                  <img src={product.images[0]} alt={product.name} className="w-full h-full object-cover" />
                ) : (
                  <div className="w-full h-full flex items-center justify-center text-white/20">No Image</div>
                )}
              </div>
              <h3 className="text-white font-medium text-sm mb-1 truncate">{product.name}</h3>
              <p className="text-amber-400 font-medium mb-1">${product.price}</p>
              <p className="text-white/40 text-xs mb-3 truncate">{product.category}</p>
              <div className="flex gap-2">
                <button onClick={() => handleEdit(product)} className="flex-1 bg-amber-500 hover:bg-amber-600 text-black py-2 rounded-lg text-xs font-medium">Edit</button>
                <button onClick={() => handleDelete(product.id)} className="bg-red-500/20 hover:bg-red-500/40 text-red-400 py-2 px-3 rounded-lg text-xs">Delete</button>
              </div>
            </div>
          ))}
        </div>

        {products.length === 0 && !loading && (
          <div className="text-center py-20 text-white/40">No products yet. Add your first product!</div>
        )}
      </div>
    </div>
  );
}

function ProductModalContent({ product, onClose }) {
  const [currentImg, setCurrentImg] = React.useState(0);
  const images = product.images || [];

  const prevImg = () => setCurrentImg(prev => prev > 0 ? prev - 1 : images.length - 1);
  const nextImg = () => setCurrentImg(prev => prev < images.length - 1 ? prev + 1 : 0);

  React.useEffect(() => {
    const handleKey = (e) => {
      if (e.key === 'ArrowLeft') prevImg();
      if (e.key === 'ArrowRight') nextImg();
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, []);

  return (
    <div className="fixed inset-0 bg-black/95 z-50 flex items-center justify-center" onClick={onClose}>
      <button onClick={(e) => { e.stopPropagation(); prevImg(); }} className="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white text-2xl z-10">‹</button>

function ProductPage({ category, onBack }) {
  const [sortBy, setSortBy] = React.useState('default');
  const [priceFilter, setPriceFilter] = React.useState('all');
  const [selectedProduct, setSelectedProduct] = React.useState(null);
  const [products, setProducts] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    loadProducts();
  }, [category.name]);

  const loadProducts = async () => {
    setLoading(true);
    const data = await supabaseFetch(`products?category=eq.${encodeURIComponent(category.name)}&order=created_at.desc`);
    setProducts(data || []);
    setLoading(false);
  };

  const sortedProducts = React.useMemo(() => {
    let filtered = [...products];
    if (priceFilter !== 'all') {
      if (priceFilter === 'low') filtered = filtered.filter(p => p.price < 200);
      else if (priceFilter === 'medium') filtered = filtered.filter(p => p.price >= 200 && p.price < 400);
      else if (priceFilter === 'high') filtered = filtered.filter(p => p.price >= 400);
    }
    // Extract number from product name for proper numeric sorting
    const getSortNum = (name) => {
      const match = name.match(/(\d+)$/);
      return match ? parseInt(match[1]) : 0;
    };
    // Default sort: by name number (1, 2, 3... not 1, 10, 11)
    if (sortBy === 'default') {
      filtered.sort((a, b) => getSortNum(a.name) - getSortNum(b.name));
    } else if (sortBy === 'price-low') {
      filtered.sort((a, b) => a.price - b.price);
    } else if (sortBy === 'price-high') {
      filtered.sort((a, b) => b.price - a.price);
    }
    return filtered;
  }, [products, sortBy, priceFilter]);

  const ProductCard = ({ product }) => (
    <div onClick={() => setSelectedProduct(product)} className="group cursor-pointer">
      <div className="aspect-[3/4] rounded-xl bg-zinc-800 border border-white/10 overflow-hidden mb-3 relative">

          <span className="bg-white text-black px-4 py-2 rounded-full text-sm font-medium">View Details</span>
        </div>
      </div>
      <div className="text-center">
        <h3 className="text-white text-sm font-medium mb-1">{product.name}</h3>
        <p className="text-amber-400 text-lg font-medium">${product.price}</p>
      </div>
    </div>
  );

  const ProductModal = selectedProduct ? (
    <ProductModalContent product={selectedProduct} onClose={() => setSelectedProduct(null)} />
  ) : null;

  return (
    <div className="min-h-screen bg-black">
      <div className="sticky top-0 bg-black border-b border-white/10 z-40">
        <div className="flex items-center justify-between px-4 py-3">
          <button onClick={onBack} className="flex items-center gap-2 text-white/80 hover:text-white transition-colors">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" /></svg>
            <span className="text-sm">Back</span>
          </button>
          <h1 className="text-white font-medium text-lg">{category.name}</h1>
          <span className="text-white/60 text-sm">{sortedProducts.length} Products</span>
        </div>
        <div className="flex items-center justify-between px-4 py-2 border-t border-white/10">
          <select value={priceFilter} onChange={e => setPriceFilter(e.target.value)} className="bg-zinc-800 text-white text-sm px-3 py-2 rounded-lg border border-white/10 focus:outline-none focus:border-amber-500">
            <option value="all">All Prices</option>
            <option value="low">Under $200</option>
            <option value="medium">$200 - $400</option>
            <option value="high">$400+</option>
          </select>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="bg-zinc-800 text-white text-sm px-3 py-2 rounded-lg border border-white/10 focus:outline-none focus:border-amber-500">
            <option value="default">Default</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
          </select>
        </div>
      </div>
      <div className="p-4">
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
          {sortedProducts.map(product => <ProductCard key={product.id} product={product} />)}
        </div>
        {sortedProducts.length === 0 && (
          <div className="text-center py-20"><p className="text-white/60">No products found in this category.</p></div>
        )}
      </div>
      {ProductModal}
    </div>
  );
}

// ============ APP ============
function App() {
  const [selectedCategory, setSelectedCategory] = React.useState(null);
  const [selectedGender, setSelectedGender] = React.useState(null);
  const [showAdmin, setShowAdmin] = React.useState(false);

  // 暴露给外部调用的管理员入口
  React.useEffect(() => {
    window.showAdminPanel = () => setShowAdmin(true);
    return () => { window.showAdminPanel = null; };
  }, []);

  // 处理类目选择
  const handleCategorySelect = (categoryName, gender) => {
    setSelectedCategory(categoryName);
    setSelectedGender(gender);
  };

  // 返回主页
  const handleBack = () => {
    setSelectedCategory(null);
    setSelectedGender(null);
  };

  // 如果选择了类目，显示产品页面
  if (selectedCategory) {
    const categoryId = `${selectedCategory.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '')}-${selectedGender === 'mens' ? 'm' : 'w'}`;
    const categoryInfo = { id: categoryId, name: selectedCategory };

    return (
      <ProductPage
        category={categoryInfo}
        onBack={handleBack}
      />
    );
  }

  // 正常主页
  return (
    <div className="min-h-screen bg-black">
      {showAdmin && <AdminPanel onClose={() => setShowAdmin(false)} />}
      <TopBar onCategorySelect={handleCategorySelect} />
      <VideoCarousel />
      <SectionTransition />
      <ImageCarousel />

      {/* Brand Story Transition */}
      <section className="py-8 md:py-16 px-4 md:px-8 bg-black">
        <div className="max-w-4xl mx-auto text-center">
          <p className="text-amber-500 text-sm tracking-[0.3em] uppercase mb-4">Our Promise</p>
          <h2 className="font-heading italic text-3xl md:text-4xl text-white mb-4">
            Crafting Dreams Into Timeless Treasures
          </h2>
          <p className="text-white/60 text-sm leading-relaxed max-w-2xl mx-auto">
            From the depths of imagination to the brilliance of your moments — every piece tells a story.
            Our master artisans transform your vision into extraordinary jewelry that transcends time.
          </p>
          <div className="flex items-center justify-center gap-8 mt-8">
            <div className="text-center">
              <p className="font-heading italic text-3xl text-amber-400">12K+</p>
              <p className="text-white/40 text-xs mt-1">Happy Clients</p>
            </div>

            <div className="w-px h-12 bg-white/10" />
            <div className="text-center">
              <p className="font-heading italic text-3xl text-amber-400">100%</p>
              <p className="text-white/40 text-xs mt-1">Lab Certified</p>
            </div>

            <div className="w-px h-12 bg-white/10" />
            <div className="text-center">
              <p className="font-heading italic text-3xl text-amber-400">∞</p>
              <p className="text-white/40 text-xs mt-1">Lifetime Warranty</p>
            </div>
          </div>
        </div>
      </section>

      <DividerSection />
      <HeroSection />
      <HotProducts />
      <CategoriesSection />
      <Testimonials />
      <SocialMedia />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
